<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talentuur Keuze</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="topbar">
      <a href="/admin.html">Admin login</a>
    </div>
    <main class="container">
      <section class="card">
        <h1>Talentuur keuzeformulier</h1>
        <p class="muted">Log in met leerlingnummer en klas. Daarna kun je 4 voorkeuren invullen.</p>
      </section>

      <section id="login-section" class="card">
        <form id="login-form">
          <div class="row">
            <div>
              <label for="loginStudentNumber">Leerlingnummer</label>
              <input id="loginStudentNumber" name="studentNumber" required />
            </div>
            <div>
              <label for="loginClassName">Klas</label>
              <input id="loginClassName" name="className" required />
            </div>
          </div>
          <div class="actions" style="margin-top: 12px">
            <button type="submit">Inloggen</button>
          </div>
          <div id="login-status" class="status"></div>
        </form>
      </section>

      <section id="choice-section" class="card hidden">
        <p class="hint" id="session-label"></p>
        <form id="student-form">
          <div class="row" style="margin-top: 12px">
            <div>
              <label for="periodId">Periode</label>
              <select id="periodId" name="periodId" required></select>
            </div>
            <div>
              <label for="choice1">1e keuze</label>
              <select id="choice1" name="choice1" required></select>
            </div>
            <div>
              <label for="choice2">2e keuze</label>
              <select id="choice2" name="choice2" required></select>
            </div>
            <div>
              <label for="choice3">3e keuze</label>
              <select id="choice3" name="choice3" required></select>
            </div>
            <div>
              <label for="choice4">4e keuze</label>
              <select id="choice4" name="choice4" required></select>
            </div>
          </div>

          <div class="actions" style="margin-top: 12px">
            <button type="submit">Opslaan</button>
            <button id="logout-btn" type="button" class="secondary">Uitloggen</button>
          </div>
          <div id="status" class="status"></div>
        </form>
      </section>
    </main>
    <script src="/student.js"></script>
  </body>
</html>
